services:
  postgres:
    image: postgres:16.8
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4.2
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
