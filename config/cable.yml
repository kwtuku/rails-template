redis_container: &redis_container
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>

development:
  adapter: redis
  <<: *redis_container
  channel_prefix: rails80_sandbox_development

test:
  adapter: redis
  <<: *redis_container
  channel_prefix: rails80_sandbox_test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: rails80_sandbox_production
